<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunaPlayer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #1a1a2e;
         color: #eee; min-height: 100vh; }
  .container { max-width: 820px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #e94560; font-size: 1.6rem; }

  .player-bar { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .song-info { text-align: center; margin-bottom: 12px; }
  .song-title { font-size: 1.2rem; font-weight: 600; }
  .song-artist { color: #aaa; font-size: 0.9rem; }

  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .progress-row span { font-size: 0.8rem; min-width: 36px; color: #aaa; }
  .seek-bar { flex:1; height:6px; -webkit-appearance:none; appearance:none;
              background:#0f3460; border-radius:3px; outline:none; }
  .seek-bar::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px;
    background:#e94560; border-radius:50%; cursor:pointer; }

  .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .controls button { background: #0f3460; color: #eee; border: none; padding: 10px 18px;
    border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: .15s; }
  .controls button:hover { background: #e94560; }
  .controls button:disabled { opacity: 0.4; cursor: default; }

  .extra-row { display: flex; justify-content: center; align-items: center; gap: 20px;
               margin-top: 12px; font-size: 0.85rem; color: #aaa; flex-wrap: wrap; }
  .extra-row label { display: flex; align-items: center; gap: 6px; }
  .vol-slider { width: 100px; height: 4px; }

  .playlist { background: #16213e; border-radius: 12px; padding: 12px; max-height: 400px;
              overflow-y: auto; }
  .playlist table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .playlist th { text-align: left; padding: 6px 8px; color: #e94560;
                 border-bottom: 1px solid #0f3460; position: sticky; top: 0;
                 background: #16213e; }
  .playlist td { padding: 6px 8px; border-bottom: 1px solid #0f3460; cursor: pointer; }
  .playlist tr:hover td { background: #1a1a3e; }
  .playlist tr.playing td { color: #e94560; font-weight: 600; }
  .playlist .idx { width: 32px; text-align: center; color: #666; }

  #scanBtn { background: #533483; } #scanBtn:hover { background: #e94560; }
  #scanBtn:disabled { opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <h1>LunaPlayer</h1>

  <div class="player-bar">
    <div class="song-info">
      <div class="song-title" id="songTitle">—</div>
      <div class="song-artist" id="songArtist">—</div>
    </div>
    <div class="progress-row">
      <span id="timeCur">0:00</span>
      <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0">
      <span id="timeTotal">0:00</span>
    </div>
    <div class="controls">
      <button onclick="cmd('prev')">⏮ Prev</button>
      <button id="playBtn" onclick="cmd('play')">▶ Play</button>
      <button onclick="cmd('pause')">⏸ Pause</button>
      <button onclick="cmd('stop')">⏹ Stop</button>
      <button onclick="cmd('next')">⏭ Next</button>
    </div>
    <div class="extra-row">
      <label> 🔊
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100"
               oninput="cmd('vol/'+this.value)">
      </label>
      <span id="volLabel">100%</span>
      <label> Mode:
        <select id="modeSelect" onchange="cmd('mode/'+this.value)">
          <option value="sequential">Sequential</option>
          <option value="loop">List Loop</option>
          <option value="single-loop">Single Loop</option>
        </select>
      </label>
    </div>
  </div>

  <div class="playlist" id="playlistContainer">
    <table>
      <thead><tr>
        <th class="idx">#</th><th>Title</th><th>Artist</th><th>Album</th><th>Duration</th>
      </tr></thead>
      <tbody id="playlistBody"></tbody>
    </table>
  </div>

  <div style="text-align:center; margin-top:16px; background:#16213e; border-radius:12px; padding:16px;">
    <label style="display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;">
      <span style="color:#aaa;">Music folder:</span>
      <input type="text" id="musicPath" style="flex:1; min-width:200px; background:#0f3460; color:#eee;
             border:1px solid #533483; border-radius:6px; padding:8px 12px; font-size:0.9rem;">
      <button id="scanBtn" onclick="doScan()" style="background:#533483; color:#eee; border:none;
              padding:8px 18px; border-radius:8px; font-size:0.9rem; cursor:pointer;">Scan</button>
    </label>
    <div id="scanStatus" style="margin-top:8px; font-size:0.8rem; color:#aaa;"></div>
  </div>
</div>

<script>
async function cmd(action) {
  try {
    await fetch('/api/' + action, { method: 'POST' });
  } catch (e) { /* ignore */ }
}

function fmt(sec) {
  if (!sec || sec <= 0) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + s.toString().padStart(2, '0');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function loadSongs() {
  try {
    const r = await fetch('/api/songs');
    const songs = await r.json();
    const tbody = document.getElementById('playlistBody');
    tbody.innerHTML = '';
    songs.forEach((s, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="idx">${i}</td>
        <td>${esc(s.title) || '?'}</td>
        <td>${esc(s.artist) || '—'}</td>
        <td>${esc(s.album) || '—'}</td>
        <td>${fmt(s.duration)}</td>`;
      tr.onclick = () => cmd('play/' + i);
      tbody.appendChild(tr);
    });
  } catch (e) { /* server not ready yet */ }
}

async function refreshStatus() {
  try {
    const r = await fetch('/api/status');
    const st = await r.json();

    document.getElementById('songTitle').textContent = st.song_title || '—';
    document.getElementById('songArtist').textContent = st.song_artist || '—';
    document.getElementById('timeCur').textContent = fmt(st.position_ms / 1000);
    document.getElementById('timeTotal').textContent = fmt(st.duration_ms / 1000);

    const seek = document.getElementById('seekBar');
    if (!seek.dragging) {
      const max = Math.max(st.duration_ms / 1000, 1);
      seek.max = max;
      seek.value = Math.min(st.position_ms / 1000, max);
    }

    document.getElementById('volLabel').textContent = st.volume + '%';
    document.getElementById('volSlider').value = st.volume;
    document.getElementById('modeSelect').value = st.mode;

    document.querySelectorAll('#playlistBody tr').forEach((tr, i) => {
      tr.classList.toggle('playing', i === st.current_index);
    });

    // Update play button text
    const playBtn = document.getElementById('playBtn');
    playBtn.textContent = st.state === 'playing' ? '⏸ Pause' : '▶ Play';
    if (st.state === 'playing') {
      playBtn.onclick = () => cmd('pause');
    } else {
      playBtn.onclick = () => cmd('play');
    }
  } catch (e) { /* polling */ }
}

document.getElementById('seekBar').addEventListener('mousedown', () => { seekBar.dragging = true; });
document.getElementById('seekBar').addEventListener('mouseup', function () {
  seekBar.dragging = false;
  cmd('seek/' + this.value);
});
document.getElementById('seekBar').addEventListener('touchstart', () => { seekBar.dragging = true; });
document.getElementById('seekBar').addEventListener('touchend', function () {
  seekBar.dragging = false;
  cmd('seek/' + this.value);
});

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ') { e.preventDefault(); cmd('toggle'); }
  if (e.key === 'ArrowRight') cmd('next');
  if (e.key === 'ArrowLeft') cmd('prev');
});

// Initial load
loadSongs();
refreshStatus();

// Load saved path from server
fetch('/api/getpath').then(r => r.json()).then(d => {
  if (d.path) document.getElementById('musicPath').value = d.path;
}).catch(() => {});

// Scan: set path first, then trigger scan
async function doScan() {
  const path = document.getElementById('musicPath').value.trim();
  if (!path) { document.getElementById('scanStatus').textContent = 'Please enter a folder path.'; return; }
  document.getElementById('scanStatus').textContent = 'Scanning ...';
  document.getElementById('scanBtn').disabled = true;
  try {
    const r = await fetch('/api/setpath', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path})
    });
    const data = await r.json();
    if (data.ok) {
      document.getElementById('scanStatus').textContent = 'Scan complete: ' + data.imported + ' new songs.';
      loadSongs();
    } else {
      document.getElementById('scanStatus').textContent = 'Error: ' + (data.error || 'unknown');
    }
  } catch (e) {
    document.getElementById('scanStatus').textContent = 'Request failed.';
  }
  document.getElementById('scanBtn').disabled = false;
}

// Periodic refresh
setInterval(refreshStatus, 1000);
setInterval(loadSongs, 5000);
</script>
</body>
</html>
